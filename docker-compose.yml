# Standalone-Stack für web_rapt (RAPT Brewing Dashboard).
# Bringt sein eigenes Netzwerk (rapt_net) mit, damit es unabhängig deployed
# werden kann — auch auf einem anderen VPS.
#
# Standalone:     cd RAPT_Brewing_Dashboard-new && docker compose up -d
# Eingebettet:    brew_assistent-new/docker-compose.yml zieht diese Datei via `include:`
#                 (Bootstrap: wer brew_assistent installiert, kriegt RAPT mit).
# Cross-Repo-Tunnel: wer cloudflared auf rapt_net joinen will (z.B. webPage_infra),
#                    referenziert `rapt_net` als external network.

name: webrapt

services:

  web_rapt:
    container_name: web-rapt
    image: ${DOCKERHUB_USERNAME}/web_rapt:latest
    pull_policy: always
    restart: unless-stopped
    ports:
      - "${WEB_RAPT_PORT:-8082}:80"
    networks:
      - rapt_net

networks:
  rapt_net:
    driver: bridge
